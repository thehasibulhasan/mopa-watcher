name: Check MOPA Latest News

on:
  schedule:
    # Bangladesh is UTC+6, no daylight saving.
    # 11:00 AM Dhaka = 05:00 UTC
    - cron: "0 5 * * *"
    # 5:00 PM Dhaka = 11:00 UTC
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # lets you trigger a manual test run from the Actions tab

permissions:
  contents: write   # needed so the workflow can commit the updated seen_state.json

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 playwright

      - name: Install Playwright browser (for GEMS, a JS-rendered page)
        run: playwright install --with-deps chromium

      - name: Run check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_mopa.py

      - name: Save seen-items state back to the repo
        run: |
          git config user.name "mopa-watcher-bot"
          git config user.email "actions@github.com"
          git add seen_state.json
          git diff --cached --quiet || git commit -m "Update seen state [skip ci]"
          git push
